<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cherish Banhotra | Featured Gallery</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav class="navbar" aria-label="Primary navigation">
    <button class="nav-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/releases">Releases</a></li>
      <li><a class="active" href="/gallery" aria-current="page">Featured Gallery</a></li>
    </ul>
  </nav>

  <main>
    <section class="page-hero">
      <div class="page-heading">
        <h1>Featured <span>Gallery</span></h1>
      </div>
    </section>

    <section class="content-section">
      <div class="gallery-grid">
        <article class="gallery-card">
          <button class="gallery-preview" type="button" data-full="/assets/CB5.png" data-title="Cherish Banhotra">
            <img src="/assets/CB5.png" alt="Cherish Banhotra">
          </button>
        </article>
        <article class="gallery-card">
          <button class="gallery-preview" type="button" data-full="/assets/CB7.png" data-title="Cherish Banhotra">
            <img src="/assets/CB7.png" alt="Cherish Banhotra">
          </button>
        </article>
        <article class="gallery-card">
          <button class="gallery-preview" type="button" data-full="/assets/CB3.png" data-title="Cherish Banhotra">
            <img src="/assets/CB3.png" alt="Cherish Banhotra">
          </button>
        </article>
        <article class="gallery-card">
          <button class="gallery-preview" type="button" data-full="/assets/CB1.png" data-title="Cherish Banhotra">
            <img src="/assets/CB1.png" alt="Cherish Banhotra">
          </button>
        </article>
        <article class="gallery-card">
          <button class="gallery-preview" type="button" data-full="/assets/CB6.png" data-title="Cherish Banhotra">
            <img src="/assets/CB6.png" alt="Cherish Banhotra" loading="lazy" decoding="async">
          </button>
        </article>
      </div>
    </section>

  </main>

  <div id="imageModal" class="image-modal" role="dialog" aria-modal="true" aria-labelledby="modalCaption" aria-hidden="true">
    <button class="modal-backdrop" type="button" aria-label="Close image preview"></button>
    <div class="modal-content">
      <button class="modal-close" type="button" aria-label="Close image preview">&times;</button>
      <img id="modalImage" src="" alt="">
      <p id="modalCaption"></p>
    </div>
  </div>

  <footer>&copy; 2026 Cherish Banhotra</footer>
  <script src="/site-effects.js"></script>
  <script src="/gallery-lightbox.js"></script>
</body>
</html>
